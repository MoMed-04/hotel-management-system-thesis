{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold" style="color: var(--text-main);">{{ t('Create Reservation') }}</h3>
            <a href="{{ url_for('bookings.index') }}" class="btn btn-sm border" style="background-color: transparent; color: var(--text-muted);"><i class="fas fa-arrow-left me-2"></i> {{ t('Back to List') }}</a>
        </div>

        <div class="card p-2">
            <div class="card-body p-4">
                
                <form action="{{ url_for('bookings.create') }}" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="small fw-bold mb-1" style="color: var(--text-muted);">{{ t('Select Guest') }}</label>
                            <select name="customer_id" class="form-select" required>
                                <option value="" disabled selected>{{ t('Choose a guest...') }}</option>
                                {% for c in customers %}
                                    <option value="{{ c.id }}">{{ c.full_name }} ({{ c.phone }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-4">
                            <label class="small fw-bold mb-1" style="color: var(--text-muted);">{{ t('Select Room') }}</label>
                            <select name="room_id" class="form-select" required>
                                <option value="" disabled selected>{{ t('Choose a room...') }}</option>
                                {% for r in rooms %}
                                    <option value="{{ r.id }}">Room {{ r.room_number }} - {{ r.room_type }} (${{ "%.2f"|format(r.price) }})</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="small fw-bold mb-1" style="color: var(--text-muted);">{{ t('Check-in Date') }}</label>
                            <input type="text" name="check_in_date" class="form-control datepicker" placeholder="Select check-in..." required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="small fw-bold mb-1" style="color: var(--text-muted);">{{ t('Check-out Date') }}</label>
                            <input type="text" name="check_out_date" class="form-control datepicker" placeholder="Select check-out..." required>
                        </div>
                    </div>

                    <hr class="my-4" style="border-color: var(--border);">
                    
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('bookings.index') }}" class="btn border me-3" style="background-color: transparent; color: var(--text-muted);">{{ t('Cancel') }}</a>
                        <button type="submit" class="btn fw-bold px-4" style="background-color: var(--primary); color: white;"><i class="fas fa-check-circle me-2"></i> {{ t('Confirm Availability & Book') }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Initialize Flatpickr (Premium Calendar UI)
        flatpickr(".datepicker", {
            dateFormat: "Y-m-d",
            minDate: "today",
            theme: "dark"
        });

        // 2. Wrap the Jinja logic inside a JS string so the IDE doesn't panic!
        const errorMessage = "{{ error if error else '' }}";
        
        if (errorMessage.trim() !== "") {
            Swal.fire({
                icon: 'error',
                title: 'Booking Failed',
                text: errorMessage,
                confirmButtonColor: 'var(--primary)',
                background: 'var(--card)',
                color: 'var(--text-main)'
            });
        }
    });
</script>
{% endblock %}
