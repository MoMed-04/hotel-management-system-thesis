{% extends 'base.html' %}

{% block content %}
<style>
    :root { --chat-bg: #f8f9fa; --chat-border: #e9ecef; --bot-bubble: #ffffff; --user-bubble: #0d6efd; --bot-text: #333; --user-text: #fff; }
    [data-theme="dark"] { --chat-bg: #0f172a; --chat-border: #334155; --bot-bubble: #1e293b; --user-bubble: #3b82f6; --bot-text: #f8f9fa; --user-text: #fff; }
    
    .chat-container { background-color: var(--chat-bg); border: 1px solid var(--chat-border); border-radius: 1rem; overflow: hidden; height: 75vh; display: flex; flex-direction: column; }
    .chat-header { background-color: var(--bot-bubble); border-bottom: 1px solid var(--chat-border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .chat-body { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .chat-footer { background-color: var(--bot-bubble); border-top: 1px solid var(--chat-border); padding: 1rem 1.5rem; }
    
    .message { max-width: 85%; display: flex; flex-direction: column; }
    .message-user { align-self: flex-end; align-items: flex-end; }
    .message-bot { align-self: flex-start; align-items: flex-start; }
    
    .bubble { padding: 0.8rem 1.2rem; border-radius: 1.2rem; font-size: 0.95rem; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .message-user .bubble { background-color: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 0.2rem; }
    .message-bot .bubble { background-color: var(--bot-bubble); color: var(--bot-text); border: 1px solid var(--chat-border); border-bottom-left-radius: 0.2rem; }
    
    .timestamp { font-size: 0.7rem; opacity: 0.6; margin-top: 0.3rem; color: var(--text-main); }
    
    .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #888; border-radius: 50%; margin: 0 2px; animation: typing 1.4s infinite both; }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
</style>

<div class="container mt-4 mb-5" style="max-width: 900px;">
    <div class="chat-container shadow-lg">
        
        <div class="chat-header">
            <div class="d-flex align-items-center">
                <div class="position-relative me-3">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; font-size: 1.2rem;">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="position-absolute bottom-0 end-0 bg-success border border-white rounded-circle" style="width: 12px; height: 12px;"></span>
                </div>
                <div>
                    <h5 class="fw-bold m-0" style="color: var(--text-main);">SaaS AI Assistant</h5>
                    <small class="text-success fw-bold"><i class="fas fa-bolt me-1"></i>{{ t('Online & Responsive') }}</small>
                </div>
            </div>
            <button class="btn btn-sm btn-outline-danger" onclick="clearChat()"><i class="fas fa-trash-alt"></i></button>
        </div>

        <div class="chat-body" id="chatBox">
            <div class="message message-bot">
                <div class="bubble">Hello <strong>{{ session.get('username', 'Guest') }}</strong>! I am your AI Assistant powered by Gemini. How can I help you today?</div>
                <div class="timestamp">Just now</div>
            </div>
        </div>

        <div class="chat-footer">
            <form id="chatForm" onsubmit="sendMessage(event)" class="d-flex gap-2">
                <input type="text" id="userInput" class="form-control rounded-pill px-4 py-2" placeholder="{{ t('Type your prompt message here...') }}" autocomplete="off" required style="background: var(--chat-bg); border-color: var(--chat-border); color: var(--text-main);">
                <button type="submit" class="btn btn-primary rounded-circle shadow-sm" style="width: 45px; height: 45px; flex-shrink: 0;" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>

    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function getTime() {
        return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message message-${sender}`;
        const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        msgDiv.innerHTML = `
            <div class="bubble">${formattedText}</div>
            <div class="timestamp">${getTime()}</div>
        `;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTypingIndicator() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message message-bot';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="bubble typing-indicator"><span></span><span></span><span></span></div>`;
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if(indicator) indicator.remove();
    }

    function sendMessage(e) {
        e.preventDefault();
        const msg = userInput.value.trim();
        if(!msg) return;

        appendMessage('user', msg);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        showTypingIndicator();

        fetch('{{ url_for("guest.api_chat") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg })
        })
        .then(response => response.json())
        .then(data => {
            removeTypingIndicator();
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
            
            if(data.success) {
                appendMessage('bot', data.reply);
            } else {
                // THE FIX: It will now print the actual Python error to the chat screen!
                console.error("API Error:", data.error);
                appendMessage('bot', `<i class='fas fa-exclamation-triangle text-danger me-2'></i> <strong>Error:</strong> ${data.error}`);
            }
        })
        .catch(err => {
            removeTypingIndicator();
            userInput.disabled = false;
            sendBtn.disabled = false;
            appendMessage('bot', "<i class='fas fa-wifi text-danger me-2'></i> Connection to AI severed.");
        });
    }

    function clearChat() {
        chatBox.innerHTML = `
            <div class="message message-bot">
                <div class="bubble">Chat history cleared. How can I help you?</div>
                <div class="timestamp">${getTime()}</div>
            </div>`;
    }
</script>
{% endblock %}
