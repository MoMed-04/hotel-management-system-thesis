{% extends "base.html" %}

{% block content %}
<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0" style="color: var(--text-main);">
            <i class="fas fa-star text-warning me-2"></i>{{ t('Real Guest Experiences') }}
        </h2>
        <button class="btn btn-primary fw-bold" onclick="openReviewModal()">
            <i class="fas fa-pen me-2"></i>{{ t('Write a Review') }}
        </button>
    </div>

    <div class="row g-4" id="reviewsContainer">
        <div class="col-12 text-center py-5" id="loadingReviews">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Loading reviews...</p>
        </div>
    </div>
</div>

<!-- Write Review Modal -->
<div class="modal fade" id="writeReviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: var(--bg-secondary, #fff); border: 1px solid var(--border);">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold" style="color: var(--text-main);">
                    <i class="fas fa-pen text-primary me-2"></i>{{ t('Submit Your Feedback') }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold" style="color: var(--text-main);">{{ t('Rate Your Stay') }}</label>
                    <select class="form-select" id="reviewStars">
                        <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                        <option value="4">⭐⭐⭐⭐ (Good)</option>
                        <option value="3">⭐⭐⭐ (Average)</option>
                        <option value="2">⭐⭐ (Poor)</option>
                        <option value="1">⭐ (Terrible)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold" style="color: var(--text-main);">{{ t('Which room did you stay in?') }}</label>
                    <select class="form-select" id="reviewRoom">
                        <option value="">Loading your booked rooms...</option>
                    </select>
                    <small class="text-muted">Only rooms you have booked are shown.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold" style="color: var(--text-main);">{{ t('Your Review') }}</label>
                    <textarea class="form-control" id="reviewText" rows="4" placeholder="{{ t('Tell us about your experience...') }}"></textarea>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ t('Cancel') }}</button>
                <button type="button" class="btn btn-primary fw-bold" onclick="submitReview()">
                    <i class="fas fa-paper-plane me-2"></i>{{ t('Post Review') }}
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Load reviews on page load
    async function loadReviews() {
        try {
            const res = await fetch('/guest/api/get_reviews');
            const data = await res.json();
            const container = document.getElementById('reviewsContainer');

            if (!data.success || data.reviews.length === 0) {
                container.innerHTML = `<div class="col-12 text-center py-5"><p class="text-muted">No reviews yet. Be the first to write one!</p></div>`;
                return;
            }

            const stars = (n) => '⭐'.repeat(n) + '☆'.repeat(5 - n);
            const colors = ['bg-primary', 'bg-success', 'bg-danger', 'bg-warning', 'bg-info'];

            container.innerHTML = data.reviews.map((r, i) => `
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm rounded-4 h-100 p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="d-flex align-items-center gap-2">
                                <div class="${colors[i % colors.length]} text-white rounded-circle d-flex align-items-center justify-content-center fw-bold" style="width:40px;height:40px;">
                                    ${r.username.substring(0, 2).toUpperCase()}
                                </div>
                                <div>
                                    <h6 class="mb-0 fw-bold" style="color: var(--text-main);">${r.username}</h6>
                                    <small class="text-muted">Stayed in ${r.room_type}</small>
                                </div>
                            </div>
                            <div class="text-warning fs-5">${stars(r.stars)}</div>
                        </div>
                        <p style="color: var(--text-main); opacity: 0.9;">"${r.review}"</p>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error(err);
        }
    }

    // Open review modal and load guest's booked rooms
    async function openReviewModal() {
        try {
            const res = await fetch('/guest/api/my_rooms');
            const data = await res.json();
            const select = document.getElementById('reviewRoom');

            if (!data.success || data.rooms.length === 0) {
                select.innerHTML = '<option value="">No bookings found — book a room first!</option>';
            } else {
                select.innerHTML = data.rooms.map(r =>
                    `<option value="${r.id}">Room ${r.room_number} (${r.room_type})</option>`
                ).join('');
            }
        } catch (err) {
            console.error(err);
        }
        new bootstrap.Modal(document.getElementById('writeReviewModal')).show();
    }

    // Submit review
    async function submitReview() {
        const stars = document.getElementById('reviewStars').value;
        const room_id = document.getElementById('reviewRoom').value;
        const review = document.getElementById('reviewText').value.trim();

        if (!room_id) {
            alert('Please select a room.');
            return;
        }
        if (!review) {
            alert('Please write a review.');
            return;
        }

        try {
            const res = await fetch('/guest/api/submit_review', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stars, room_id, review })
            });
            const data = await res.json();
            if (data.success) {
                bootstrap.Modal.getInstance(document.getElementById('writeReviewModal')).hide();
                document.getElementById('reviewText').value = '';
                loadReviews();
                alert('Review posted successfully!');
            } else {
                alert('Error: ' + data.error);
            }
        } catch (err) {
            alert('Something went wrong.');
        }
    }

    loadReviews();
</script>
{% endblock %}
