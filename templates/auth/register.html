{% extends 'base.html' %}

{% block login_content %}
<style>
    body { background-color: #2c3e50; display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; }
    .login-card { width: 100%; max-width: 450px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: white; }
    .brand-logo { font-size: 3rem; color: #198754; text-align: center; margin-bottom: 10px; }
</style>

<div class="position-absolute top-0 end-0 p-4">
    <div class="btn-group shadow-sm">
        <a href="/set_lang/en" class="btn btn-sm btn-light fw-bold {% if session.get('lang') != 'zh' %}active border-primary text-primary{% endif %}">EN</a>
        <a href="/set_lang/zh" class="btn btn-sm btn-light fw-bold {% if session.get('lang') == 'zh' %}active border-primary text-primary{% endif %}">中文</a>
    </div>
</div>

<div class="login-card">
    <div class="brand-logo"><i class="fas fa-user-plus"></i></div>
    <h3 class="text-center mb-4 text-dark font-weight-bold">{{ t('Create Account') }}</h3>
    
    {% if error %}
    <div class="alert alert-danger shadow-sm"><i class="fas fa-exclamation-circle"></i> {{ t(error) }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="mb-3">
            <label class="text-muted"><i class="fas fa-user"></i> {{ t('Choose Username') }}</label>
            <input type="text" name="username" class="form-control form-control-lg" required autofocus>
        </div>
        <div class="mb-3">
            <label class="text-muted"><i class="fas fa-lock"></i> {{ t('Password') }}</label>
            <input type="password" name="password" class="form-control form-control-lg" required>
        </div>
        <div class="mb-4">
            <label class="text-muted"><i class="fas fa-check-double"></i> {{ t('Confirm Password') }}</label>
            <input type="password" name="confirm_password" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-success btn-lg w-100 mb-3"><i class="fas fa-user-check"></i> {{ t('Register Now') }}</button>
        
        <div class="text-center mt-3">
            <span class="text-muted">{{ t('Already have an account?') }}</span> 
            <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold text-primary">{{ t('Log In Here') }}</a>
        </div>
    </form>
</div>
{% endblock %}
