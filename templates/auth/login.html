{% extends 'base.html' %}

{% block login_content %}
<style>
    /* Specific styling just for the login background */
    body { background-color: #2c3e50; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: white; }
    .brand-logo { font-size: 3rem; color: #3498db; text-align: center; margin-bottom: 10px; }
</style>

<div class="login-card">
    <div class="brand-logo"><i class="fas fa-hotel"></i></div>
    <h3 class="text-center mb-4 text-dark font-weight-bold">Hotel System</h3>
    
    {% if error %}
    <div class="alert alert-danger shadow-sm"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <label class="text-muted"><i class="fas fa-user"></i> Username</label>
            <input type="text" name="username" class="form-control form-control-lg" required autofocus>
        </div>
        <div class="mb-4">
            <label class="text-muted"><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100"><i class="fas fa-sign-in-alt"></i> Log In</button>
    </form>
</div>
{% endblock %}
